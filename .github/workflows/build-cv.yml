name: Build CV PDF

on:
  push:
    paths:
      - "chengwuCVgithub.tex"
      - "resume.cls"
      - ".github/workflows/build-cv.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cv:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-extra

      - name: Build CV PDF
        run: latexmk -pdf -interaction=nonstopmode -halt-on-error chengwuCVgithub.tex

      - name: Commit updated PDF
        run: |
          git add chengwuCVgithub.pdf

          if git diff --cached --quiet -- chengwuCVgithub.pdf; then
            echo "No PDF changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Build CV PDF [skip ci]"
          git push
